sonar.projectKey=constructtrack
sonar.projectName=Construction Progress Tracker
sonar.projectVersion=1.0.0
sonar.sources=backend/app,frontend/src
sonar.tests=backend/tests,frontend/src
sonar.test.inclusions=**/*test*.py,**/*.test.js
sonar.python.version=3.11
sonar.python.coverage.reportPaths=backend/coverage.xml
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.exclusions=**/node_modules/**,**/build/**,**/venv/**,**/__pycache__/**
sonar.sourceEncoding=UTF-8
